bind-key '"' split-window -v -c "#{pane_current_path}"
bind-key % split-window -h -c "#{pane_current_path}"

set-option -g mouse on
set-option -g status on
set-option -g history-limit 10000
set-option -g status-interval 5
set-option -g status-position bottom
set-option -g status-justify left


set-option -g default-terminal 'tmux-256color'
set-option -ga terminal-overrides ',*256col*:Tc'

# Use vi keys
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -r C-h select-window -t:-
bind-key -r C-l select-window -t:+
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Pane border configuration
set-option -g pane-border-status top
set-option -g pane-border-format '#[fg=#666666]#P#[default] #{?pane_title,#{pane_title},#{pane_current_path}}'

# Modern status bar configuration
set-option -g status-style 'bg=#1a1b26,fg=#c0caf5'
set-option -g status-left-length 50
set-option -g status-right-length 50

# Left side: Session name only
set-option -g status-left '#[fg=#7aa2f7,bold] #S #[fg=#565f89]│ '

# Right side: Clean without time/date
set-option -g status-right ''

# Window status format - clean and modern
set-window-option -g window-status-format '#[fg=#565f89] #I#[fg=#414868]:#[fg=#a9b1d6]#W#{?window_zoomed_flag,🔍,} '
set-window-option -g window-status-current-format '#[fg=#7aa2f7,bold] #I#[fg=#565f89]:#[fg=#c0caf5,bold]#W#{?window_zoomed_flag,🔍,} '

# Window status separator
set-window-option -g window-status-separator ''

# Pane border colors (modern theme)
set-option -g pane-border-style 'fg=#414868'
set-option -g pane-active-border-style 'fg=#7aa2f7'

# Message styling
set-option -g message-style 'bg=#7aa2f7,fg=#1a1b26,bold'
set-option -g message-command-style 'bg=#e0af68,fg=#1a1b26,bold'
